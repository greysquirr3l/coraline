name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

# Top-level permissions - individual jobs may override
permissions:
  contents: read

jobs:
  # Build binaries for multiple platforms
  build-binaries:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: coraline-linux-x86_64
            use_cross: false
            build_args: ""
          # Linux x86_64 (musl, fully static — works on older glibc)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: coraline-linux-x86_64-musl
            use_cross: true
            build_args: "--no-default-features --features embeddings-dynamic"
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: coraline-linux-aarch64
            use_cross: true
            build_args: "--no-default-features --features embeddings-dynamic"
          # Linux ARM64 (musl, fully static — works on older glibc)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: coraline-linux-aarch64-musl
            use_cross: true
            build_args: "--no-default-features --features embeddings-dynamic"
          # macOS ARM64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: coraline-macos-aarch64
            use_cross: false
            build_args: ""
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: coraline-windows-x86_64.exe
            use_cross: false
            build_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: Build release binary (native)
        if: matrix.use_cross == false
        run: cargo build --release --bin coraline --target ${{ matrix.target }} ${{ matrix.build_args }}

      - name: Build release binary (cross)
        if: matrix.use_cross
        run: cross build --release --bin coraline --target ${{ matrix.target }} ${{ matrix.build_args }}

      - name: Strip binary (Linux and macOS)
        if: runner.os != 'Windows' && matrix.use_cross == false
        run: strip target/${{ matrix.target }}/release/coraline

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz coraline
          cd ../../..

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip coraline.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
          if-no-files-found: ignore

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "coraline") | .version')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION, tag is $TAG_VERSION"
            exit 1
          fi

      - name: Publish tree-sitter-blazor to crates.io
        id: publish_blazor
        run: |
          TSB_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "tree-sitter-blazor") | .version')
          # Try to publish; if it fails because version exists, that's OK
          if cargo publish --package tree-sitter-blazor 2>&1 | tee /tmp/blazor.log; then
            echo "tree-sitter-blazor@$TSB_VERSION published successfully"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          elif grep -q "already exists" /tmp/blazor.log; then
            echo "tree-sitter-blazor@$TSB_VERSION already published, continuing"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publish failed with unexpected error:"
            cat /tmp/blazor.log
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for tree-sitter-blazor to be available
        if: steps.publish_blazor.outputs.skipped == 'false'
        run: sleep 30

      - name: Publish coraline to crates.io
        run: |
          CORALINE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "coraline") | .version')
          # Try to publish; if it fails because version exists, that's OK
          if cargo publish --package coraline 2>&1 | tee /tmp/publish.log; then
            echo "coraline@$CORALINE_VERSION published successfully"
          elif grep -q "already exists" /tmp/publish.log; then
            echo "coraline@$CORALINE_VERSION already published, continuing"
          else
            echo "Publish failed with unexpected error:"
            cat /tmp/publish.log
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-crates]
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: artifacts/**/*

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract section for this version from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          else
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
