[alias]
lint = [
  "clippy",
  "--workspace",
  "--all-targets",
  "--",
  "-W",
  "clippy::all",
  "-W",
  "clippy::pedantic",
  "-W",
  "clippy::nursery",
  "-W",
  "clippy::cargo",
  "-W",
  "clippy::perf",
  "-A",
  "clippy::module_name_repetitions",
  "-A",
  "clippy::must_use_candidate",
  "-A",
  "clippy::missing_errors_doc",
  "-A",
  "clippy::missing_panics_doc",
  "-A",
  "clippy::struct_excessive_bools",
  "-D",
  "clippy::unwrap_used",
  "-D",
  "clippy::expect_used",
  "-D",
  "clippy::panic",
  "-D",
  "clippy::indexing_slicing",
  "-D",
  "clippy::cast_ptr_alignment",
  "-D",
  "clippy::suspicious",
  "-D",
  "warnings",
]
