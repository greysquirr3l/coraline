# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # paste crate - creator marked as unmaintained in README; no security issue, transitive dep
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained but has no security vulnerability; transitive dep" },
    # number_prefix is pulled transitively by indicatif for CLI progress formatting
    { id = "RUSTSEC-2025-0119", reason = "number_prefix is unmaintained; transitive via indicatif and no known vulnerability" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Skip these crates when checking for multiple versions
skip = []

# Skip tree checking for these crates
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
